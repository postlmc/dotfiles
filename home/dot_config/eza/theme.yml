colourful: true

# Dracula palette
# Background  #282A36   Foreground  #F8F8F2   Selection  #44475A
# Comment     #6272A4   Cyan        #8BE9FD   Green      #50FA7B
# Orange      #FFB86C   Pink        #FF79C6   Purple     #BD93F9
# Red         #FF5555   Yellow      #F1FA8C
#
# Color semantics used throughout:
#   Foreground #F8F8F2  neutral / unremarkable
#   Comment    #6272A4  muted / secondary / metadata noise
#   Cyan       #8BE9FD  navigation (dirs), source code, informational
#   Purple     #BD93F9  symlinks, timestamps, link counts
#   Green      #50FA7B  executable, new/added, clean, success
#   Yellow     #F1FA8C  notable / special (build files, octal, mid-large sizes)
#   Orange     #FFB86C  caution, modified, archives, large files
#   Pink       #FF79C6  media (images, video, music), flags, special perms
#   Red        #FF5555  danger — deleted, broken, root, world-writable, huge

filekinds:
  normal:       {foreground: "#F8F8F2", is_bold: false}
  directory:    {foreground: "#8BE9FD", is_bold: false}
  symlink:      {foreground: "#BD93F9", is_bold: false}
  pipe:         {foreground: "#6272A4", is_bold: false}
  block_device: {foreground: "#FFB86C", is_bold: false}
  char_device:  {foreground: "#FFB86C", is_bold: false}
  socket:       {foreground: "#6272A4", is_bold: false}
  special:      {foreground: "#FF79C6", is_bold: false}
  executable:   {foreground: "#50FA7B", is_bold: false}
  mount_point:  {foreground: "#8BE9FD", is_bold: false}

perms:
  user_read:          {foreground: "#50FA7B", is_bold: false}
  user_write:         {foreground: "#F1FA8C", is_bold: false}
  user_execute_file:  {foreground: "#FF5555", is_bold: false}
  user_execute_other: {foreground: "#FF5555", is_bold: false}
  group_read:         {foreground: "#50FA7B", is_bold: false}
  group_write:        {foreground: "#F1FA8C", is_bold: false}
  group_execute:      {foreground: "#FF5555", is_bold: false}
  other_read:         {foreground: "#50FA7B", is_bold: false}
  other_write:        {foreground: "#F1FA8C", is_bold: false}
  other_execute:      {foreground: "#FF5555", is_bold: false}
  special_user_file:  {foreground: "#FF79C6", is_bold: false}  # setuid/setgid
  special_other:      {foreground: "#FF79C6", is_bold: false}  # sticky bit
  attribute:          {foreground: "#6272A4", is_bold: false}

size:
  major:       {foreground: "#FFB86C", is_bold: false}  # device major number
  minor:       {foreground: "#BD93F9", is_bold: false}  # device minor number
  number_byte: {foreground: "#F8F8F2", is_bold: false}
  number_kilo: {foreground: "#F8F8F2", is_bold: false}
  number_mega: {foreground: "#F1FA8C", is_bold: false}
  number_giga: {foreground: "#FFB86C", is_bold: false}
  number_huge: {foreground: "#FF5555", is_bold: false}
  unit_byte:   {foreground: "#6272A4", is_bold: false}
  unit_kilo:   {foreground: "#6272A4", is_bold: false}
  unit_mega:   {foreground: "#6272A4", is_bold: false}
  unit_giga:   {foreground: "#6272A4", is_bold: false}
  unit_huge:   {foreground: "#6272A4", is_bold: false}

users:
  user_you:    {foreground: "#FFB86C", is_bold: false}
  user_root:   {foreground: "#FF5555", is_bold: false}
  user_other:  {foreground: "#FFB86C", is_bold: false}
  group_yours: {foreground: "#6272A4", is_bold: false}
  group_other: {foreground: "#6272A4", is_bold: false}
  group_root:  {foreground: "#FF5555", is_bold: false}

links:
  normal:          {foreground: "#BD93F9", is_bold: false}
  multi_link_file: {foreground: "#FFB86C", is_bold: false}  # multiple hard links = notable

git:
  new:        {foreground: "#50FA7B", is_bold: false}
  modified:   {foreground: "#FFB86C", is_bold: false}
  deleted:    {foreground: "#FF5555", is_bold: false}
  renamed:    {foreground: "#8BE9FD", is_bold: false}
  typechange: {foreground: "#FF79C6", is_bold: false}
  ignored:    {foreground: "#6272A4", is_bold: false}
  conflicted: {foreground: "#FF5555", is_bold: false}

git_repo:
  branch_main:  {foreground: "#8BE9FD", is_bold: false}
  branch_other: {foreground: "#BD93F9", is_bold: false}
  git_clean:    {foreground: "#50FA7B", is_bold: false}
  git_dirty:    {foreground: "#FFB86C", is_bold: false}

security_context:
  colon: {foreground: "#6272A4", is_bold: false}
  user:  {foreground: "#F8F8F2", is_bold: false}
  role:  {foreground: "#BD93F9", is_bold: false}
  typ:   {foreground: "#6272A4", is_bold: false}
  range: {foreground: "#FF79C6", is_bold: false}

file_type:
  image:      {foreground: "#FF79C6", is_bold: false}  # pink for visual media
  video:      {foreground: "#FF79C6", is_bold: false}
  music:      {foreground: "#50FA7B", is_bold: false}
  lossless:   {foreground: "#8BE9FD", is_bold: false}  # lossless audio distinct from lossy
  crypto:     {foreground: "#FF5555", is_bold: false}  # keys/certs = treat with care
  document:   {foreground: "#F8F8F2", is_bold: false}
  compressed: {foreground: "#FFB86C", is_bold: false}
  temp:       {foreground: "#6272A4", is_bold: false}  # temp files = noise, mute them
  compiled:   {foreground: "#6272A4", is_bold: false}  # .o, .pyc = noise
  build:      {foreground: "#F1FA8C", is_bold: false}  # Makefile, Dockerfile = notable
  source:     {foreground: "#8BE9FD", is_bold: false}

punctuation:         {foreground: "#6272A4", is_bold: false}
date:                {foreground: "#50FA7B", is_bold: false}
inode:               {foreground: "#6272A4", is_bold: false}
blocks:              {foreground: "#6272A4", is_bold: false}
header:              {foreground: "#F8F8F2", is_bold: false}
octal:               {foreground: "#F1FA8C", is_bold: false}
flags:               {foreground: "#FF79C6", is_bold: false}

symlink_path:        {foreground: "#BD93F9", is_bold: false}
control_char:        {foreground: "#FF5555", is_bold: false}
broken_symlink:      {foreground: "#FF5555", is_bold: false}
broken_path_overlay: {foreground: "#FF5555", is_bold: false}
